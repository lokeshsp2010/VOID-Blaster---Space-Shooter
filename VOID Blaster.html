<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VOID Blaster — Reloaded</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&family=Russo+One&display=swap');

    : root {
      --clr-bg:       #07000f;
      --clr-main:     #cc00ff;
      --clr-accent:   #ff6aff;
      --clr-enemy:    #ff2244;
      --clr-bullet:   #ffee00;
      --clr-shield:   #00ccff;
      --clr-hud:      #dd88ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--clr-bg);
      display: flex;
      flex-direction: column;
      align-items: centre;
      justify-content: centre;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'VT323', monospace;
      color: var(--clr-hud);
    }
    
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    #wrapper {
      position: relative;
      width: 480px;
    }

    #hud {
      display: flex;
      justify-content: space-between;
      align-items: centre;
      padding: 6px 2px 4px;
      font-size: 22px;
      letter-spacing: 1px;
    }
    #hud .hud-block { display: flex; flex-direction: column; align-items: center; }
    #hud .label { font-size: 13px; color: #884499; letter-spacing: 2px; }
    #hud .val   { color: var(--clr-accent); text-shadow: 0 0 8px var(--clr-main); }

    canvas {
      display: block;
      border: 2px solid #440066;
      box-shadow: 0 0 30px #aa00ff44, 0 0 60px #aa00ff11;
    }
   
    #powerBar {
      display: flex;
      justify-content: centre;
      gap: 8px;
      padding: 5px 0;
      font-size: 14px;
      letter-spacing: 1px;
      color: #664488;
    }
    #powerBar span { transition: color 0.3s; }
    #powerBar span.active { color: var(--clr-accent); text-shadow: 0 0 6px var(--clr-main); }
    
    #overlay {
      position: absolute;
      top: 34px; /* below HUD */
      left: 0;
      width: 480px;
      height: 560px;
      display: flex;
      flex-direction: column;
      align-items: centre;
      justify-content: centre;
      gap: 14px;
      z-index: 30;
      background: rgba(7,0,15,0.88);
    }
    #overlay.hidden { display: none; }

    #overlay h1 {
      font-family: 'Russo One', sans-serif;
      font-size: 52px;
      color: var(--clr-accent);
      text-shadow: 0 0 30px var(--clr-main), 0 0 80px #aa00ff44;
      text-align: centre;
      line-height: 1.1;
    }
    #overlay .sub {
      font-size: 20px;
      color: #884499;
      letter-spacing: 2px;
      text-align: centre;
      line-height: 1.7;
    }
    #overlay .big-score {
      font-family: 'Russo One', sans-serif;
      font-size: 64px;
      color: var(--clr-bullet);
      text-shadow: 0 0 20px #ffee0088;
    }
    #overlay .wave-info {
      font-size: 22px;
      color: #cc88ff;
      letter-spacing: 3px;
    }

    .btn {
      padding: 10px 40px;
      font-family: 'VT323', monospace;
      font-size: 24px;
      letter-spacing: 3px;
      background: transparent;
      border: 2px solid var(--clr-main);
      color: var(--clr-accent);
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 0 12px #aa00ff44;
    }
    .btn: hover {
      background: var(--clr-main);
      color: var(--clr-bg);
      box-shadow: 0 0 28px var(--clr-main);
    }
    
    #ctrlRow {
      display: none;
      gap: 10px;
      padding: 10px 0 0;
      justify-content: centre;
    }
    @media (max-width: 520px) {
      #ctrlRow { display: flex; }
      #wrapper { width: 100vw; }
      canvas   { width: 100vw; height: auto; }
      #hud     { width: 100vw; padding: 6px 14px; }
      #overlay { width: 100vw; }
    }
    .cBtn {
      padding: 12px 20px;
      background: #220033;
      border: 1px solid #660088;
      color: var(--clr-accent);
      font-size: 22px;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>
<body>

<div id="wrapper">
  <div id="hud">
    <div class="hud-block">
      <span class="label">SCORE</span>
      <span class="val" id="scoreEl">0</span>
    </div>
    <div class="hud-block">
      <span class="label">LIVES</span>
      <span class="val" id="livesEl">♥♥♥</span>
    </div>
    <div class="hud-block">
      <span class="label">WAVE</span>
      <span class="val" id="waveEl">1</span>
    </div>
    <div class="hud-block">
      <span class="label">SHIELD</span>
      <span class="val" id="shieldEl">—</span>
    </div>
  </div>

  <canvas id="gc" width="480" height="560"></canvas>

  <div id="powerBar">
    <span id="pw-rapid">⚡ RAPID</span>
    <span id="pw-double">✦ DOUBLE</span>
    <span id="pw-shield">🛡 SHIELD</span>
  </div>

  <div id="overlay">
    <h1>VOID<br>BLASTER</h1>
    <div class="sub">← → MOVE &nbsp;|&nbsp; SPACE SHOOT<br>S = SHIELD (if active)</div>
    <button class="btn" onclick="startGame()">▶ LAUNCH</button>
  </div>

  <div id="ctrlRow">
    <button class="cBtn" id="mLeft">◀</button>
    <button class="cBtn" id="mShield">🛡</button>
    <button class="cBtn" id="mShoot">●</button>
    <button class="cBtn" id="mRight">▶</button>
  </div>
</div>

<script>

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = 480, H = 560;

let score, lives, wave, running, rafId;
let player, bullets, enemies, drops, sparks, stars;
let held = {};
let shotTimer = 0;
let eShotTimer = 0;
let pwRapid  = 0;
let pwDouble = 0;
let pwShield = 0;
let shieldActive = false;  
const PSPEED  = 5;
const BSPEED  = 9;
const BASE_DELAY = 16;
  
function buildStars() {
  stars = Array.from({length: 90}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.4 + 0.2,
    spd: Math.random() * 0.5 + 0.08,
    a: Math.random()
  }));
}

function tickStars() {
  stars.forEach(s => {
    s.y += s.spd;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.fillStyle = `rgba(210,180,255,${0.2 + s.a * 0.6})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  });
}

function makePlayer() {
  return { x: W/2, y: H - 60, w: 34, h: 38, invTimer: 0 };
}

function drawPlayer() {
  const p = player;
  if (p.invTimer > 0 && Math.floor(p.invTimer/4) % 2 === 0) return; // blink when hit

  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#cc00ff';

  ctx.fillStyle = '#cc00ff';
  ctx.beginPath();
  ctx.moveTo(0, -p.h/2);
  ctx.lineTo(-p.w/2, p.h/3);
  ctx.lineTo(-p.w/4, p.h/5);
  ctx.lineTo(0, p.h/2);
  ctx.lineTo(p.w/4, p.h/5);
  ctx.lineTo(p.w/2, p.h/3);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#1a0033';
  ctx.beginPath();
  ctx.ellipse(0, -6, 7, 9, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ff88ff44';
  ctx.beginPath();
  ctx.ellipse(-1, -8, 3, 4, -0.3, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = shieldActive && pwShield > 0 ? '#00ccff' : '#ff44cc';
  ctx.shadowColor = ctx.fillStyle;
  ctx.beginPath();
  const fh = 10 + Math.random() * 10;
  ctx.moveTo(-9, p.h/2);
  ctx.lineTo(0, p.h/2 + fh);
  ctx.lineTo(9, p.h/2);
  ctx.closePath();
  ctx.fill();

  if (shieldActive && pwShield > 0) {
    ctx.strokeStyle = `rgba(0,204,255,${0.3 + Math.random()*0.3})`;
    ctx.lineWidth = 2;
    ctx.shadowColor = '#00ccff';
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI*2);
    ctx.stroke();
  }

  ctx.restore();
}

function makeEnemies() {
  enemies = [];
  const cols = Math.min(10, 7 + wave - 1);
  const gap = Math.min(50, (W - 50) / cols);
  const ox  = (W - cols * gap) / 2;

  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < cols; col++) {
      const t = row === 0 ? 1 : row === 2 ? 2 : 0;
      enemies.push({
        x: ox + col * gap + gap/2,
        y: 55 + row * 46,
        w: 26, h: 20,
        hp: t === 1 ? 2 : 1,
        type: t,
        alive: true,
        zigPhase: Math.random() * Math.PI * 2
      });
    }
  }
  enemies.dx  = 0.9 + wave * 0.25;
  enemies.dir = 1;
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  const flash = e.flashTimer > 0;
  
  if (e.type === 0) {
    
    ctx.shadowBlur = 8; ctx.shadowColor = '#ff2244';
    ctx.fillStyle = flash ? '#ffffff' : '#ff2244';
    ctx.beginPath();
    ctx.moveTo(0, -e.h/2);
    ctx.lineTo(e.w/2, 0);
    ctx.lineTo(0, e.h/2);
    ctx.lineTo(-e.w/2, 0);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath(); ctx.arc(-5, -2, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -2, 3, 0, Math.PI*2); ctx.fill();

  } else if (e.type === 1) {
  
    ctx.shadowBlur = 12; ctx.shadowColor = '#ff6600';
    ctx.fillStyle = flash ? '#ffffff' : '#dd4400';
    ctx.fillRect(-e.w/2, -e.h/2, e.w, e.h);
    ctx.fillStyle = flash ? '#ffccaa' : '#ff8833';
    ctx.fillRect(-e.w/2+3, -e.h/2+3, e.w-6, e.h/2);

    if (e.hp === 2) {
      ctx.fillStyle = '#00ff88';
      ctx.fillRect(-4, e.h/2-5, 8, 3);
    }

  } else {
    
    ctx.shadowBlur = 8; ctx.shadowColor = '#ffaa00';
    ctx.fillStyle = flash ? '#ffffff' : '#ffaa00';
    ctx.beginPath();
    ctx.moveTo(0, -e.h/2);
    ctx.lineTo(-e.w/3, e.h/2);
    ctx.lineTo(e.w/3, e.h/2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ff4400';
    ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI*2); ctx.fill();
  }

  ctx.restore();
  if (e.flashTimer > 0) e.flashTimer--;
}

function spawnDrop(x, y) {
  if (Math.random() > 0.22) return;  // 22% chance
  const kinds = ['rapid', 'double', 'shield'];
  drops.push({
    x, y,
    kind: kinds[Math.floor(Math.random() * kinds.length)],
    vy: 1.8,
    life: 300
  });
}

function drawDrop(d) {
  ctx.save();
  ctx.translate(d.x, d.y);
  const c = d.kind === 'rapid' ? '#ffee00' : d.kind === 'double' ? '#00ff88' : '#00ccff';
  ctx.shadowBlur = 10; ctx.shadowColor = c;
  ctx.strokeStyle = c; ctx.lineWidth = 1.5;
  ctx.strokeRect(-8, -8, 16, 16);
  ctx.fillStyle = c + '44';
  ctx.fillRect(-8, -8, 16, 16);
  ctx.fillStyle = c;
  ctx.font = '14px VT323';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(d.kind === 'rapid' ? '⚡' : d.kind === 'double' ? '✦' : '🛡', 0, 1);
  ctx.restore();
}

function burst(x, y, col, n) {
  n = n || 14;
  for (let i = 0; i < n; i++) {
    const ang = (Math.PI*2 * i / n) + Math.random() * 0.6;
    const spd = Math.random() * 3.5 + 0.8;
    sparks.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      r: Math.random() * 2.5 + 0.8,
      life: 1,
      dec: 0.035 + Math.random() * 0.03,
      col
    });
  }
}

function tickSparks() {
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy;
    s.life -= s.dec;
    if (s.life <= 0) { sparks.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = s.life;
    ctx.fillStyle = s.col;
    ctx.shadowBlur = 6; ctx.shadowColor = s.col;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function refreshHUD() {
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('livesEl').textContent = '♥'.repeat(lives);
  document.getElementById('waveEl').textContent  = wave;
  document.getElementById('shieldEl').textContent = pwShield > 0
    ? (shieldActive ? '● ON' : '○ OFF')
    : '—';
  document.getElementById('pw-rapid').className  = pwRapid  > 0 ? 'active' : '';
  document.getElementById('pw-double').className = pwDouble > 0 ? 'active' : '';
  document.getElementById('pw-shield').className = pwShield > 0 ? 'active' : '';
}

function hit(ax, ay, aw, ah, bx, by, bw, bh) {
  return Math.abs(ax - bx) < (aw + bw) / 2 &&
         Math.abs(ay - by) < (ah + bh) / 2;
}

function enemyFire() {
  eShotTimer--;
  if (eShotTimer > 0) return;
  eShotTimer = Math.max(20, 55 - wave * 4);
  const alive = enemies.filter(e => e.alive);
  if (!alive.length) return;
  const e = alive[Math.floor(Math.random() * alive.length)];
  // speeder fires diagonal
  const vx = e.type === 2 ? (Math.random() > 0.5 ? 1.5 : -1.5) : 0;
  bullets.push({ x: e.x, y: e.y + 10, vx, vy: 4.5 + wave*0.2, hostile: true, col: '#ff2244' });
}

function loop() {
  if (!running) return;
  rafId = requestAnimationFrame(loop);

  ctx.clearRect(0, 0, W, H);
  tickStars();
  
  const p = player;
  if (p.invTimer > 0) p.invTimer--;
  if ((held.ArrowLeft  || held.a) && p.x > p.w/2)     p.x -= PSPEED;
  if ((held.ArrowRight || held.d) && p.x < W - p.w/2) p.x += PSPEED;

  shotTimer--;
  const delay = pwRapid > 0 ? Math.floor(BASE_DELAY/2.5) : BASE_DELAY;
  if ((held[' '] || held.mShoot) && shotTimer <= 0) {
    if (pwDouble > 0) {
      bullets.push({x: p.x-10, y: p.y - p.h/2, vx: 0, vy: -BSPEED, hostile: false, col: '#00ff88'});
      bullets.push({x: p.x+10, y: p.y - p.h/2, vx: 0, vy: -BSPEED, hostile: false, col: '#00ff88'});
    } else {
      bullets.push({x: p.x, y: p.y - p.h/2, vx: 0, vy: -BSPEED, hostile: false, col: '#cc00ff'});
    }
    shotTimer = delay;
  }

  if (pwRapid  > 0) pwRapid--;
  if (pwDouble > 0) pwDouble--;
  if (pwShield > 0) {
    pwShield--;
    if (pwShield === 0) { shieldActive = false; }
  }

  let bounce = false;
  enemies.forEach(e => {
    if (!e.alive) return;
    e.x += enemies.dx * enemies.dir;
    
    if (e.type === 2) e.x += Math.sin(e.zigPhase += 0.08) * 0.8;
    if (e.x > W - 18 || e.x < 18) bounce = true;
  });
  if (bounce) {
    enemies.dir *= -1;
    enemies.forEach(e => { if (e.alive) e.y += 16; });
  }
  
  enemyFire();
  
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y < -12 || b.y > H+12 || b.x < -12 || b.x > W+12)
      bullets.splice(i, 1);
  }

  outer:
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    if (b.hostile) continue;
    for (let ei = 0; ei < enemies.length; ei++) {
      const e = enemies[ei];
      if (!e.alive) continue;
      if (hit(b.x, b.y, 4, 14, e.x, e.y, e.w, e.h)) {
        bullets.splice(bi, 1);
        e.hp--;
        e.flashTimer = 4;
        if (e.hp <= 0) {
          e.alive = false;
          score += (e.type === 1 ? 25 : 10) * wave;
          burst(e.x, e.y, e.type === 1 ? '#ff6600' : '#ff2244');
          spawnDrop(e.x, e.y);
          refreshHUD();
        }
        continue outer;
      }
    }
  }

  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    if (!b.hostile) continue;
    if (!hit(b.x, b.y, 4, 14, p.x, p.y, p.w, p.h)) continue;
    bullets.splice(bi, 1);
    if (shieldActive && pwShield > 0) {
      burst(b.x, b.y, '#00ccff', 8);
      pwShield = 0; shieldActive = false;
      refreshHUD();
    } else if (p.invTimer === 0) {
      p.invTimer = 90;
      lives--;
      burst(p.x, p.y, '#cc00ff', 22);
      refreshHUD();
      if (lives <= 0) { endGame(); return; }
    }
  }

  for (let i = drops.length - 1; i >= 0; i--) {
    const d = drops[i];
    d.y += d.vy;
    d.life--;
    if (d.life <= 0 || d.y > H + 20) { drops.splice(i, 1); continue; }
    
    if (hit(d.x, d.y, 16, 16, p.x, p.y, p.w, p.h)) {
      if (d.kind === 'rapid')  pwRapid  = 300;
      if (d.kind === 'double') pwDouble = 300;
      if (d.kind === 'shield') pwShield = 300;
      burst(d.x, d.y, d.kind === 'rapid' ? '#ffee00' : d.kind === 'double' ? '#00ff88' : '#00ccff', 10);
      drops.splice(i, 1);
      refreshHUD();
      continue;
    }
    drawDrop(d);
  }

  if (enemies.some(e => e.alive && e.y > H - 36)) { endGame(); return; }

  
  if (enemies.every(e => !e.alive)) {
    wave++;
    bullets = [];
    drops   = [];
    makeEnemies();
    refreshHUD();
  }

  enemies.forEach(e => { if (e.alive) drawEnemy(e); });
  bullets.forEach(b => {
    ctx.save();
    ctx.shadowBlur = 10; ctx.shadowColor = b.col;
    ctx.fillStyle  = b.col;
    ctx.fillRect(b.x - 2, b.y - 8, 4, 12);
    ctx.restore();
  });
  drawPlayer();
  tickSparks();
}

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  score = 0; lives = 3; wave = 1;
  pwRapid = 0; pwDouble = 0; pwShield = 0; shieldActive = false;
  player   = makePlayer();
  bullets  = []; sparks = []; drops = [];
  shotTimer  = 0; eShotTimer = 80;
  buildStars();
  makeEnemies();
  refreshHUD();
  running = true;
  if (rafId) cancelAnimationFrame(rafId);
  loop();
}

function endGame() {
  running = false;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h1>GAME<br>OVER</h1>
    <div class="big-score">${score}</div>
    <div class="wave-info">WAVE ${wave} REACHED</div>
    <button class="btn" onclick="startGame()">↺ RETRY</button>
  `;
  ov.classList.remove('hidden');
}

window.addEventListener('keydown', e => {
  held[e.key] = true;
  if (e.key === 's' || e.key === 'S') {
    if (pwShield > 0) shieldActive = !shieldActive;
    refreshHUD();
  }
  e.preventDefault();
});
window.addEventListener('keyup', e => { held[e.key] = false; });

[['mLeft','ArrowLeft'],['mRight','ArrowRight'],['mShoot',' '],['mShield','s']].forEach(([id, key]) => {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('touchstart', e => { e.preventDefault(); held[key] = true; });
  btn.addEventListener('touchend',   e => { e.preventDefault(); held[key] = false; });
});
</script>
</body>
</html>
